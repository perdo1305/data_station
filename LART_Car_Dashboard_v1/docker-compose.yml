x-common-environment: &common-environment
  ROS_DOMAIN_ID: 0
  ROS_AUTOMATIC_DISCOVERY_RANGE: SUBNET
  PYTHONUNBUFFERED: 1
  DISPLAY: ${DISPLAY}
  QT_X11_NO_MITSHM: 1
  XDG_RUNTIME_DIR: /tmp
  XAUTHORITY: /root/.Xauthority
  LIBGL_ALWAYS_SOFTWARE: 1
  SDL_VIDEODRIVER: x11
  SDL_RENDER_DRIVER: software
  MESA_LOADER_DRIVER_OVERRIDE: softpipe

services:
  # Display container - builds and runs the dashboard UI
  # Image is pre-built via: make build  (docker build -t lart-dashboard-ros2 ...)
  display:
    image: lart-dashboard-ros2
    container_name: lart-dashboard-display
    hostname: display
    environment: *common-environment
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - .:/root/lart_ws/LART_Car_Dashboard_v1
    command: >
      bash -c "
        source /root/.bashrc &&
        echo 'Building and starting CMake LVGL Interface...' &&
        rm -rf /tmp/lart-ui-build &&
        cmake -S /root/lart_ws/LART_Car_Dashboard_v1/src/ui -B /tmp/lart-ui-build &&
        cmake --build /tmp/lart-ui-build --parallel $(nproc) &&
        if [ -x /tmp/lart-ui-build/ui_runner ]; then
          echo 'Starting ui_runner...' &&
          /tmp/lart-ui-build/ui_runner
        else
          echo 'ERROR: ui_runner was not built successfully' &&
          ls -la /tmp/lart-ui-build &&
          exit 1
        fi
      "
    networks:
      - lart-ros2-network
    depends_on:
      - publisher
    stdin_open: true
    tty: true
    restart: unless-stopped
    ipc: host

  # Publisher container - publishes the test speed topics
  publisher:
    image: lart-dashboard-ros2
    container_name: lart-dashboard-publisher
    hostname: publisher
    environment: *common-environment
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - .:/root/lart_ws/LART_Car_Dashboard_v1
    command: >
      bash -c "
        source /root/.bashrc &&
        echo 'Publisher ready.' &&
        sleep infinity
      "
    networks:
      - lart-ros2-network
    stdin_open: true
    tty: true
    ipc: host

  # Screen changer container - idle helper for publishing /dashboard/set_screen
  # Usage: docker exec lart-dashboard-screen-changer bash -lc \
  #   "ros2 topic pub -1 /dashboard/set_screen std_msgs/msg/Int32 '{data: 2}'"
  # Screen IDs: 1=Driver View  2=Autonomous  3=Debug  4=Debug Autonomous
  screen_changer:
    image: lart-dashboard-ros2
    container_name: lart-dashboard-screen-changer
    hostname: screen_changer
    environment: *common-environment
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - .:/root/lart_ws/LART_Car_Dashboard_v1
    command: >
      bash -c "
        source /root/.bashrc &&
        echo 'Screen changer ready.' &&
        echo 'Usage: ros2 topic pub -1 /dashboard/set_screen std_msgs/msg/Int32 \"{data: N}\"' &&
        echo '  1=Driver View  2=Autonomous  3=Debug  4=Debug Autonomous' &&
        sleep infinity
      "
    networks:
      - lart-ros2-network
    depends_on:
      - publisher
    stdin_open: true
    tty: true
    ipc: host

  # ── CAN Bridge / DBC Simulation stack ──────────────────────────────────────
  # Mounts the data_station workspace (../../data_station relative to this file)
  # and runs can_simulator + can_bridge with autonomous_t26.dbc.
  # Publishes decoded signals on /can/dbc/<msg>/<signal> topics visible to all
  # containers on lart-ros2-network.
  #
  # The data_station path is resolved via ${DATA_STATION_PATH} (default: ../..
  # relative to this file, i.e. /home/$USER/dev/data_station).
  # Override from the host:  DATA_STATION_PATH=/path/to/data_station docker compose up can_bridge
  #
  # Usage:
  #   docker compose up can_bridge            # start only the CAN stack
  #   docker compose logs -f can_bridge       # follow logs
  #   docker exec -it lart-can-bridge \
  #     bash -lc "ros2 topic list | grep /can/dbc"
  #   docker exec -it lart-can-bridge \
  #     bash -lc "ros2 topic echo /can/dbc/acu/ign std_msgs/msg/Float32"
  can_bridge:
    image: lart-dashboard-ros2
    container_name: lart-can-bridge
    hostname: can_bridge
    environment:
      <<: *common-environment
      DATA_STATION_WS: /root/data_station_ws
    volumes:
      - ${DATA_STATION_PATH:-..}:/root/data_station_ws:ro
    cap_add:
      - NET_ADMIN   # needed for ip link / vcan
    command: |
      bash -c "
        source /root/.bashrc &&
        echo '=== Installing cantools ===' &&
        pip install --break-system-packages --ignore-installed 'cantools>=39.0' &&
        python3 -c 'import cantools; print("cantools", cantools.__version__, "ready")' &&
        echo '=== Setting up virtual CAN (vcan0) ===' &&
        modprobe vcan 2>/dev/null || true &&
        ip link add vcan0 type vcan 2>/dev/null || true &&
        ip link set vcan0 up &&
        echo 'vcan0 is UP' &&
        echo '=== Building data_station ROS packages ===' &&
        mkdir -p /root/ds_build/build /root/ds_build/install /root/ds_build/log &&
        cd /tmp && COLCON_LOG_PATH=/root/ds_build/log colcon build --build-base /root/ds_build/build --install-base /root/ds_build/install --base-paths /root/data_station_ws/src --packages-select lart_msgs lart_bringup sim &&
        source /root/ds_build/install/setup.bash &&
        echo '=== Launching DBC simulation stack ===' &&
        ros2 launch lart_bringup dbc_sim.launch.py
      "
    networks:
      - lart-ros2-network
    stdin_open: true
    tty: true
    ipc: host


networks:
  lart-ros2-network:
    driver: bridge
