x-common-environment: &common-environment
  ROS_DOMAIN_ID: 0
  ROS_AUTOMATIC_DISCOVERY_RANGE: SUBNET
  PYTHONUNBUFFERED: 1
  DISPLAY: ${DISPLAY}
  QT_X11_NO_MITSHM: 1
  XDG_RUNTIME_DIR: /tmp
  XAUTHORITY: /root/.Xauthority
  LIBGL_ALWAYS_SOFTWARE: 1
  SDL_VIDEODRIVER: x11
  SDL_RENDER_DRIVER: software
  MESA_LOADER_DRIVER_OVERRIDE: softpipe

services:
  # Display container - builds and runs the dashboard UI
  display:
    build:
      context: ..
      dockerfile: LART_Car_Dashboard_v1/Dockerfile
    container_name: lart-dashboard-display
    hostname: display
    environment: *common-environment
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - .:/root/lart_ws/LART_Car_Dashboard_v1
    command: >
      bash -c "
        source /root/.bashrc &&
        echo 'Building and starting CMake LVGL Interface...' &&
        cd /root/lart_ws/LART_Car_Dashboard_v1/src/ui &&
        mkdir -p build && cd build &&
        cmake .. && make -j$(nproc) &&
        if [ -x ./ui_runner ]; then
          echo 'Starting ui_runner...' &&
          ./ui_runner
        else
          echo 'ERROR: ui_runner was not built successfully' &&
          ls -la &&
          exit 1
        fi
      "
    networks:
      - lart-ros2-network
    depends_on:
      - publisher
    stdin_open: true
    tty: true
    restart: unless-stopped
    ipc: host
    devices:
      - /dev/dri:/dev/dri

  # Publisher container - publishes the test speed topics
  publisher:
    build:
      context: ..
      dockerfile: LART_Car_Dashboard_v1/Dockerfile
    container_name: lart-dashboard-publisher
    hostname: publisher
    environment: *common-environment
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      - .:/root/lart_ws/LART_Car_Dashboard_v1
    # command removed so the service uses the image's default CMD
    networks:
      - lart-ros2-network
    stdin_open: true
    tty: true
    ipc: host

networks:
  lart-ros2-network:
    driver: bridge
